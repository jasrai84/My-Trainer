<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>My Trainer</title>

  <!-- Home screen icon (this is what fixes the iPhone shortcut icon) -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />

  <!-- Makes it launch full-screen (no Safari address bar) when added to the home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Trainer" />
  <meta name="theme-color" content="#17191A" />
  <link rel="manifest" href="manifest.json" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #17191A; }
    #root { min-height: 100vh; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>

  <!-- React, no build step needed -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone: lets the browser understand the JSX in app.js directly -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react" src="app.js"></script>
</body>
</html>
