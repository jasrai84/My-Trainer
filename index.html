<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>My Trainer</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Trainer" />
  <meta name="theme-color" content="#17191A" />
  <link rel="manifest" href="manifest.json" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #17191A; }
    #root { min-height: 100vh; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    window.addEventListener("error", function (e) {
      var root = document.getElementById("root");
      if (root) {
        var msg = e.message || (e.target && e.target.src ? "Failed to load: " + e.target.src : "Unknown error");
        root.innerHTML = '<pre style="color:#FF5A1F;background:#1F2224;padding:16px;white-space:pre-wrap;font-family:monospace;font-size:12px;">' +
          "Error: " + msg + "\n" +
          (e.filename ? "File: " + e.filename + ":" + e.lineno + "\n" : "") + "</pre>";
      }
    }, true);
    setTimeout(function () {
      var root = document.getElementById("root");
      if (root && root.textContent.trim() === "Loading…") {
        root.innerHTML = '<pre style="color:#FF5A1F;background:#1F2224;padding:16px;white-space:pre-wrap;font-family:monospace;font-size:12px;">App did not start within 5 seconds — likely app.js failed to load or transform.</pre>';
      }
    }, 5000);
  </script>
</head>
<body>
  <div id="root"><div style="color:#6B7275;font-family:monospace;font-size:12px;padding:16px;">Loading…</div></div>
  <script type="text/babel" data-presets="react" src="app.js"></script>
</body>
</html>
